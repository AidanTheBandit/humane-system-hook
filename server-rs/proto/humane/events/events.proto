// Reconstructed from decompiled protobuf-lite Java classes.
// EventsIngestService — telemetry event ingestion.

syntax = "proto3";

package humane.events;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "humane/common/encryption.proto";

option java_multiple_files = true;

// ---- Messages ----

message UUID {
  string value = 1;
}

message NotableEvent {
  UUID event_identifier = 1;
  string originator_identifier = 2;
  google.protobuf.Timestamp creation_time = 3;
  google.protobuf.Struct event_data = 4;
  string event_type = 5;
  humane.common.encryption.EncryptedData encrypted_event_data = 6;
  humane.common.encryption.EncryptedData encrypted_location = 7;
  bool device_is_locked = 8;
}

message IngestResponse {
  UUID event_identifier = 1;
}

message IngestBatchRequest {
  repeated NotableEvent events = 1;
}

message IngestBatchResponse {
  repeated UUID event_identifier = 1;
}

// ---- Service ----

service EventsIngestService {
  // Unary: ingest single event
  rpc Ingest (NotableEvent) returns (IngestResponse);

  // Unary: ingest batch of events
  rpc IngestBatch (IngestBatchRequest) returns (IngestBatchResponse);
}
